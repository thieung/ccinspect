# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: ccinspect

before:
  hooks:
    - go mod tidy

builds:
  - id: ccinspect
    main: ./cmd/ccinspect
    binary: ccinspect
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: thieung
    name: ccinspect
